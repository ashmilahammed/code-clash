name: CD Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            echo "🚀 Starting Deployment..."

            cd /home/ubuntu/code-clash || exit 1

            echo "📥 Syncing code..."
            git fetch origin
            git reset --hard origin/main

            # ===== BACKEND =====
            # echo "⚙️ Building Backend..."
            # cd backend
            # npm install
            # npm run build
            # pm2 restart codeclash-backend || pm2 start dist/main.js --name codeclash-backend
            # pm2 save

            # ===== BACKEND =====
            echo "🐳 Deploying Backend with Docker..."

            cd backend

            # Kill any process using port 5000 
            sudo fuser -k 5000/tcp || true

            # Remove all docker containers
            docker kill $(docker ps -q) || true
            docker rm $(docker ps -aq) || true

            # Build new image
            docker build -t codeclash-backend .

            # Run new container
            # docker run -d -p 5000:5000 \
            docker run -d -p 127.0.0.1:5000:5000 \
            --env-file .env \
            --restart always \
            --name backend-container \
            codeclash-backend




            # ===== FRONTEND =====
            echo "🎨 Building Frontend..."
            cd ../frontend
            npm install
            npm run build

            sudo rm -rf /var/www/html/*
            sudo cp -r dist/* /var/www/html/
            sudo systemctl reload nginx

            echo "✅ Deployment Complete!"