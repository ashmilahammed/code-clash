name: CD Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            echo "🚀 Starting Deployment..."

            cd /home/ubuntu/code-clash || exit 1

            echo "📥 Syncing code..."
            git fetch origin
            git reset --hard origin/main



            # ===== BACKEND =====
            echo "🐳 Checking backend changes..."

            if git diff --name-only HEAD~1 | grep backend; then
            echo "Backend changed → deploying..."

            cd backend

            # Kill any process using port 5000 
            sudo fuser -k 5000/tcp || true

            # Stop & remove ONLY backend container (not all containers)
            docker stop backend-container || true
            docker rm backend-container || true

            # Build new image
            docker build -t codeclash-backend .

            # Run new container
            docker run -d -p 127.0.0.1:5000:5000 \
            --env-file .env \
            --restart always \
            --name backend-container \
            codeclash-backend

            else
            echo "No backend changes → skipping deployment"
            fi



            # ===== FRONTEND =====
            # echo "🎨 Building Frontend..."
            # cd ../frontend
            # npm install
            # npm run build

            # sudo rm -rf /var/www/html/*
            # sudo cp -r dist/* /var/www/html/
            # sudo systemctl reload nginx

            # echo "✅ Deployment Complete!"


            # ===== FRONTEND =====
            echo "🎨 Checking frontend changes..."

            if git diff --name-only HEAD~1 | grep frontend; then
            echo "Frontend changed → building..."

            cd ../frontend
            npm ci
            npm run build

            sudo rm -rf /var/www/html/*
            sudo cp -r dist/* /var/www/html/
            sudo systemctl reload nginx

            else
            echo "No frontend changes → skipping build"
            fi